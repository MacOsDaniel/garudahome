<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GARUDA Home</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#173C32,#2C6E49);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
    max-width:800px;
    padding:40px;
}

h1{
    font-size:70px;
    margin-bottom:10px;
}

h2{
    font-weight:300;
    margin-bottom:40px;
}

.card{
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(10px);
    padding:40px;
    border-radius:20px;
}

p{
    font-size:20px;
    line-height:1.7;
    margin-top:20px;
}

footer{
    margin-top:40px;
    opacity:.8;
}

.button{
    display:inline-block;
    margin-top:35px;
    padding:15px 35px;
    background:white;
    color:#173C32;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
    transition:.3s;
}

.button:hover{
    transform:scale(1.05);
}
</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>GARUDA Home</h1>

<h2>El lugar donde comienza tu próxima historia.</h2>

<p>
Estamos construyendo una nueva plataforma inmobiliaria
para comprar, vender y alquilar inmuebles con mayor
confianza, transparencia y tecnología.
</p>

<a class="button" href="#">
🚧 Próximamente
</a>

<footer>

Versión Alpha 0.1

<br><br>

© 2026 GARUDA Home

</footer>

</div>

</div>

</body>

</html>
