<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garuda 2048 - Engine</title>
    <style>
        :root {
            --accent: #d4af37;
            --grid-bg: #475569;
            --cell-bg: #334155;
            --text-light: #f8fafc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #151c2e;
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-container {
            width: 100%;
            max-width: 460px;
            padding: 1rem;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .score-box {
            background: #1f2937;
            padding: 0.5rem 1.25rem;
            border-radius: 4px;
            text-align: center;
            min-width: 90px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .score-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #94a3b8;
            letter-spacing: 0.5px;
        }

        .score-value {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--accent);
        }

        .game-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .restart-btn {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 0.6rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .restart-btn:hover {
            background: var(--accent);
            color: #000;
        }

        .grid-container {
            width: 100%;
            aspect-ratio: 1;
            background-color: var(--grid-bg);
            border-radius: 6px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 12px;
            padding: 12px;
            position: relative;
            touch-action: none;
        }

        .cell {
            background-color: var(--cell-bg);
            border-radius: 4px;
            width: 100%;
            height: 100%;
        }

        /* ESTILOS CLAVE PARA EL EFECTO DE DESLIZAMIENTO */
        .tile {
    position: absolute;
    width: calc((100% - 60px) / 4);
    height: calc((100% - 60px) / 4);
    border-radius: 4px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 2rem;
    font-weight: bold;
    color: #0f172a;
    
    /* CONTROL DE DESLIZAMIENTO: Asegúrate de tener esta línea exacta */
    transition: top 0.15s ease-in-out, left 0.15s ease-in-out;
    
    /* Evita que transform rompa la transición de posición */
    will-change: top, left; 
}

        .tile-new {
            animation: appear 0.15s ease-in-out;
        }

        .tile-merged {
            animation: pop 0.15s ease-in-out;
        }

        .tile-2 { background: #f4f4f5; color: #1c1917; }
        .tile-4 { background: #e4e4e7; color: #1c1917; }
        .tile-8 { background: #d4d4d8; color: #1c1917; }
        .tile-16 { background: #cbd5e1; color: #0f172a; }
        .tile-32 { background: #94a3b8; color: #ffffff; }
        .tile-64 { background: #64748b; color: #ffffff; }
        .tile-128 { background: #e2e8f0; color: #0f172a; box-shadow: 0 0 10px rgba(255,255,255,0.2); }
        .tile-256 { background: #fef08a; color: #854d0e; }
        .tile-512 { background: #fde047; color: #854d0e; }
        .tile-1024 { background: #facc15; color: #713f12; font-size: 1.5rem; }
        .tile-2048 { background: var(--accent); color: #000000; font-size: 1.5rem; box-shadow: 0 0 20px rgba(212, 175, 55, 0.8); }

        .game-message {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(11, 15, 25, 0.9);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 6px;
            z-index: 10;
        }

        .game-message p {
            font-size: 2.2rem;
            font-weight: bold;
            margin-bottom: 1.5rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @keyframes appear {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        @media (max-width: 768px) {
            .tile { font-size: 1.5rem; }
            .tile-1024, .tile-2048 { font-size: 1.2rem; }
            .grid-container { gap: 8px; padding: 8px; }
            .tile {
                width: calc((100% - 44px) / 4);
                height: calc((100% - 44px) / 4);
            }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="game-header">
            <div style="font-size: 1.4rem; font-weight: 600; color: var(--accent); letter-spacing: 1px;">GARUDA 2048</div>
            <div style="display: flex; gap: 10px;">
                <div class="score-box">
                    <div class="score-label">Puntos</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">Mejor</div>
                    <div class="score-value" id="best-score">0</div>
                </div>
            </div>
        </div>

        <div class="game-controls">
            <button class="restart-btn" id="restart-btn">Nueva Partida</button>
        </div>

        <div class="grid-container" id="grid-container">
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            
            <div class="game-message" id="game-message">
                <p id="game-over-text">Fin del Juego</p>
                <button class="restart-btn" id="retry-btn">Reintentar</button>
            </div>
        </div>
    </div>

    <script>
        // Clase constructora individual para persistir los elementos del DOM y permitir transiciones
        class Tile {
            constructor(row, col, value) {
                this.row = row;
                this.col = col;
                this.value = value;
                this.element = this.createDOMElement();
                this.isMerged = false;
            }

            createDOMElement() {
                const element = document.createElement('div');
                element.className = `tile tile-${this.value} tile-new`;
                element.textContent = this.value;
                this.updatePosition(element);
                return element;
            }

            updatePosition(element = this.element) {
                const isMobile = window.innerWidth <= 768;
                const gap = isMobile ? 8 : 12;
                element.style.top = `calc(${gap}px + ${this.row} * ((100% - ${(5) * gap}px) / 4 + ${gap}px))`;
                element.style.left = `calc(${gap}px + ${this.col} * ((100% - ${(5) * gap}px) / 4 + ${gap}px))`;
            }

            updateValue(newValue) {
                this.value = newValue;
                this.element.textContent = newValue;
                this.element.className = `tile tile-${newValue} tile-merged`;
            }

            destroy() {
                this.element.remove();
            }
        }

        class Game2048 {
            constructor() {
                this.gridContainer = document.getElementById('grid-container');
                this.scoreDisplay = document.getElementById('score');
                this.bestScoreDisplay = document.getElementById('best-score');
                this.gameMessage = document.getElementById('game-message');
                this.restartBtn = document.getElementById('restart-btn');
                this.retryBtn = document.getElementById('retry-btn');
                
                this.size = 4;
                this.board = Array(this.size).fill(null).map(() => Array(this.size).fill(null));
                this.score = 0;
                this.bestScore = localStorage.getItem('garuda-propiedades-2048-best') || 0;
                
                this.bestScoreDisplay.textContent = this.bestScore;
                
                this.initEvents();
                this.setupGame();
            }

            setupGame() {
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        if (this.board[r][c]) {
                            this.board[r][c].destroy();
                        }
                    }
                }
                this.board = Array(this.size).fill(null).map(() => Array(this.size).fill(null));
                this.score = 0;
                this.scoreDisplay.textContent = 0;
                this.gameMessage.style.display = 'none';
                
                this.addRandomTile();
                this.addRandomTile();
            }

            addRandomTile() {
                const emptyCells = [];
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        if (!this.board[r][c]) {
                            emptyCells.push({r, c});
                        }
                    }
                }
                if (emptyCells.length > 0) {
                    const {r, c} = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                    const value = Math.random() < 0.9 ? 2 : 4;
                    const tile = new Tile(r, c, value);
                    this.board[r][c] = tile;
                    this.gridContainer.appendChild(tile.element);
                }
            }

            move(direction) {
                let moved = false;
                const vectors = {
                    0: { x: -1, y: 0 },  // Arriba
                    1: { x: 0,  y: 1 },   // Derecha
                    2: { x: 1,  y: 0 },   // Abajo
                    3: { x: 0,  y: -1 }  // Izquierda
                };

                const vector = vectors[direction];
                const traverseRows = direction === 2 ? [3, 2, 1, 0] : [0, 1, 2, 3];
                const traverseCols = direction === 1 ? [3, 2, 1, 0] : [0, 1, 2, 3];

                // Resetear combinaciones previas
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        if (this.board[r][c]) this.board[r][c].isMerged = false;
                    }
                }

                for (let r of traverseRows) {
                    for (let c of traverseCols) {
                        const tile = this.board[r][c];
                        if (tile) {
                            let currRow = r;
                            let currCol = c;
                            
                            while (
                                currRow + vector.x >= 0 && currRow + vector.x < this.size &&
                                currCol + vector.y >= 0 && currCol + vector.y < this.size &&
                                !this.board[currRow + vector.x][currCol + vector.y]
                            ) {
                                currRow += vector.x;
                                currCol += vector.y;
                            }

                            const nextRow = currRow + vector.x;
                            const nextCol = currCol + vector.y;

                            if (
                                nextRow >= 0 && nextRow < this.size &&
                                nextCol >= 0 && nextCol < this.size &&
                                this.board[nextRow][nextCol] &&
                                this.board[nextRow][nextCol].value === tile.value &&
                                !this.board[nextRow][nextCol].isMerged
                            ) {
                                const targetTile = this.board[nextRow][nextCol];
                                targetTile.updateValue(tile.value * 2);
                                targetTile.isMerged = true;
                                
                                this.score += tile.value * 2;
                                tile.row = nextRow;
                                tile.col = nextCol;
                                tile.updatePosition(); // Se desliza hacia su objetivo
                                
                                const oldTile = tile;
                                setTimeout(() => oldTile.destroy(), 120); // Se elimina tras terminar la animación
                                
                                this.board[r][c] = null;
                                moved = true;
                            } else if (currRow !== r || currCol !== c) {
                                this.board[currRow][currCol] = tile;
                                tile.row = currRow;
                                tile.col = currCol;
                                tile.updatePosition(); // Deslizamiento suave a casilla vacía
                                this.board[r][c] = null;
                                moved = true;
                            }
                        }
                    }
                }

                if (moved) {
                    this.addRandomTile();
                    this.scoreDisplay.textContent = this.score;
                    if (this.score > this.bestScore) {
                        this.bestScore = this.score;
                        localStorage.setItem('garuda-propiedades-2048-best', this.bestScore);
                        this.bestScoreDisplay.textContent = this.bestScore;
                    }
                    if (this.isGameOver()) {
                        this.gameMessage.style.display = 'flex';
                    }
                }
            }

            isGameOver() {
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        if (!this.board[r][c]) return false;
                        if (r < this.size - 1 && this.board[r + 1][c] && this.board[r][c].value === this.board[r + 1][c].value) return false;
                        if (c < this.size - 1 && this.board[r][c + 1] && this.board[r][c].value === this.board[r][c + 1].value) return false;
                    }
                }
                return true;
            }

            initEvents() {
                window.addEventListener('keydown', (e) => {
                    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'w', 's', 'a', 'd'].map(k => k.toLowerCase()).includes(e.key.toLowerCase())) {
                        e.preventDefault();
                    }
                    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') this.move(0);
                    else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') this.move(1);
                    else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') this.move(2);
                    else if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') this.move(3);
                });

                let touchStartX = 0;
                let touchStartY = 0;
                
                this.gridContainer.addEventListener('touchstart', (e) => {
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                }, { passive: true });

                this.gridContainer.addEventListener('touchend', (e) => {
                    if (!touchStartX || !touchStartY) return;
                    let diffX = e.changedTouches[0].clientX - touchStartX;
                    let diffY = e.changedTouches[0].clientY - touchStartY;

                    if (Math.abs(diffX) > Math.abs(diffY)) {
                        if (Math.abs(diffX) > 30) {
                            if (diffX > 0) this.move(1);
                            else this.move(3);
                        }
                    } else {
                        if (Math.abs(diffY) > 30) {
                            if (diffY > 0) this.move(2);
                            else this.move(0);
                        }
                    }
                }, { passive: true });

                this.restartBtn.addEventListener('click', () => this.setupGame());
                this.retryBtn.addEventListener('click', () => this.setupGame());
                
                window.addEventListener('resize', () => {
                    for (let r = 0; r < this.size; r++) {
                        for (let c = 0; c < this.size; c++) {
                            if (this.board[r][c]) this.board[r][c].updatePosition();
                        }
                    }
                });
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new Game2048();
        });
    </script>
</body>
</html>
